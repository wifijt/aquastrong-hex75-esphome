# ============================================================================
# Aquastrong HEX 75 — ESPHome Modbus integration
# ----------------------------------------------------------------------------
# Tested on:
#   Heat pump:   Aquastrong HEX 75
#   Controller:  CHICO SMBPRO53 V1.44
#   PCB:         R-SY013-BP  ← printed on the controller board
#
# Likely compatible with other CHICO-based units (Fairland, IPS,
# Poolsystems, Aquark) — see README for details.
#
# Hardware: ESP32-C6 + MAX485 module on COM2 (screw terminal block),
# leaving COM4 (JST connector) for the OEM display.
#
# Temperature units: developed on a unit set to °F. Setpoints and all
# temperature sensors report in °F natively — no conversion applied.
# If your unit is set to °C, update unit_of_measurement and setpoint
# ranges accordingly. See docs/PROTOCOL.md for details.
# ============================================================================

esphome:
  name: pool-heatpump
  friendly_name: Pool Heat Pump
  project:
    name: esphome.pool_heatpump
    version: "1.2.0"

esp32:
  board: esp32-c6-devkitm-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  level: INFO
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key

web_server:
  port: 80
  version: 3
  local: true
  include_internal: false

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

safe_mode:
  disabled: true

# ====================================================================
# UART + Modbus
# ====================================================================
# GPIO4 = TX to MAX485 DI, GPIO5 = RX from MAX485 RO
# HW-519R4 module has auto flow control (no DE/RE pin needed)
uart:
  id: mod_uart
  tx_pin: GPIO4
  rx_pin: GPIO5
  baud_rate: 9600
  stop_bits: 1
  parity: NONE
  data_bits: 8

modbus:
  id: mod_bus
  uart_id: mod_uart
  send_wait_time: 250ms
  # ESPHome 2026.3.0+ blocks TX for frame_delay + turnaround_time after ANY
  # received byte. At the 100ms default, noise at just 10 bytes/sec starves
  # TX permanently (compressor EMI easily exceeds this). 5ms restores most
  # of the pre-2026.3 talk-over-noise tolerance; command_throttle already
  # paces the single-slave bus, so the turnaround delay is redundant here.
  turnaround_time: 5ms

modbus_controller:
  - id: heatpump
    address: 0x01
    modbus_id: mod_bus
    setup_priority: -10
    update_interval: 5s
    command_throttle: 100ms
    max_cmd_retries: 4          # default, explicit: 5 attempts per command
    offline_skip_updates: 10    # on saturation: suppress reads 10 cycles (50s),
                                # drain queue, give writes a clear path
    on_offline:
      then:
        - lambda: |-
            if (id(offline_since) == 0) id(offline_since) = millis();
            ESP_LOGW("pool", "Modbus offline - suppressing reads to drain queue");
    on_online:
      then:
        - lambda: |-
            id(offline_since) = 0;
            ESP_LOGI("pool", "Modbus back online");
            // Immediately resend any write that was pending while the bus
            // was down, with a fresh confirmation window (ts reset) so the
            // 10s error timer doesn't fire on a stale timestamp.
            uint32_t now = millis();
            bool full_block = false;
            if (id(pending_power_value) >= 0)   { id(pending_power_ts) = now;          id(pending_power_retried) = false;          full_block = true; }
            if (id(pending_cool_setpoint) >= 0) { id(pending_cool_setpoint_ts) = now;  id(pending_cool_setpoint_retried) = false;  full_block = true; }
            if (id(pending_heat_setpoint) >= 0) { id(pending_heat_setpoint_ts) = now;  id(pending_heat_setpoint_retried) = false;  full_block = true; }
            if (id(pending_energy) >= 0)        { id(pending_energy_ts) = now;         id(pending_energy_retried) = false;         full_block = true; }
            if (full_block) {
              ESP_LOGI("pool", "Resending pending block write after recovery");
              id(send_full_block).execute();
            }
            if (id(pending_mode_value) >= 0) {
              id(pending_mode_ts) = now;
              id(pending_mode_retried) = false;
              ESP_LOGI("pool", "Resending pending mode write after recovery");
              id(send_mode_write).execute();
            }
            if (id(pending_auto_setpoint) >= 0) {
              id(pending_auto_setpoint_ts) = now;
              id(pending_auto_setpoint_retried) = false;
              ESP_LOGI("pool", "Resending pending auto setpoint after recovery");
              id(send_auto_setpoint_write).execute();
            }

# ====================================================================
# Globals: cached register block + pending state tracking
# ====================================================================
globals:
  - id: cache_cool_setpoint
    type: int
    restore_value: no
    initial_value: '60'
  - id: cache_heat_setpoint
    type: int
    restore_value: no
    initial_value: '80'
  - id: cache_upper_bound
    type: int
    restore_value: no
    initial_value: '104'
  - id: cache_lower_bound
    type: int
    restore_value: no
    initial_value: '65'
  - id: cache_mode
    type: int
    restore_value: no
    initial_value: '1'   # 0=Cool, 1=Heat, 8=Auto
  - id: cache_power
    type: int
    restore_value: no
    initial_value: '0'
  - id: cache_energy
    type: int
    restore_value: no
    initial_value: '0'
  - id: cache_version
    type: int
    restore_value: no
    initial_value: '59'  # 0x3B
  - id: cache_auto_setpoint
    type: int
    restore_value: no
    initial_value: '80'

  - id: pending_power_value
    type: int
    restore_value: no
    initial_value: '-1'
  - id: pending_power_ts
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: pending_power_retried
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: pending_mode_value
    type: int
    restore_value: no
    initial_value: '-1'
  - id: pending_mode_ts
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: pending_mode_retried
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: pending_cool_setpoint
    type: int
    restore_value: no
    initial_value: '-1'
  - id: pending_cool_setpoint_ts
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: pending_cool_setpoint_retried
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: pending_heat_setpoint
    type: int
    restore_value: no
    initial_value: '-1'
  - id: pending_heat_setpoint_ts
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: pending_heat_setpoint_retried
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: pending_auto_setpoint
    type: int
    restore_value: no
    initial_value: '-1'
  - id: pending_auto_setpoint_ts
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: pending_auto_setpoint_retried
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: pending_energy
    type: int
    restore_value: no
    initial_value: '-1'
  - id: pending_energy_ts
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: pending_energy_retried
    type: bool
    restore_value: no
    initial_value: 'false'

  # Bus-health watchdog timestamp (set on_offline, cleared on_online)
  - id: offline_since
    type: uint32_t
    restore_value: no
    initial_value: '0'

  # Timestamp of last successful control-block read. Confirmations are
  # only valid when a read happened AFTER the write request - otherwise
  # the cache still holds the optimistic value and would self-confirm.
  - id: last_ctrl_read_ts
    type: uint32_t
    restore_value: no
    initial_value: '0'

# ====================================================================
# Text sensor: last error
# ====================================================================
text_sensor:
  - platform: template
    name: "Pool Heater Last Error"
    id: last_error
    icon: mdi:alert-circle-outline
    update_interval: never

  - platform: template
    name: "Pool Heater Fault"
    icon: mdi:alert-circle
    update_interval: 5s
    lambda: |-
      if (!id(reg_fault).has_state()) return {};
      if (id(cache_power) == 0) return std::string("Off");
      uint16_t f = (uint16_t)id(reg_fault).state;
      if (f == 255) return std::string("OK");
      if (f == 511) return std::string("E03 Water Flow");
      // Hypothesis: bitfield, each fault adds 0x100 to baseline 0xFF
      // e.g. 767=E05 high pressure?, 1023=E06 low pressure?
      // Unconfirmed until triggered naturally — log for identification
      char buf[30];
      snprintf(buf, sizeof(buf), "Fault 0x%04X (%d)", f, f);
      return std::string(buf);

# ====================================================================
# Binary sensors
#
# Reg 29 (Flow Status):
#   255 = water flow present (normal)
#   511 = no water flow — unit refuses to run (protection, not a fault)
#   Other values = potential E-code fault state (TBD)
#
# Reg 98 (Water Flow boolean) — confirmed by test:
#   1 = flow present
#   0 = no flow
#
# Regs 96, 97, 99 = other protection status bits (TBD)
#   Hypothesis: 1=OK, 0=fault, same pattern as reg 98
#   Candidates: high pressure (E05), low pressure (E06), phase (E01/E02)
# ====================================================================
binary_sensor:
  - platform: template
    name: "Pool Heater Fault Active"
    id: any_fault
    device_class: problem
    icon: mdi:alert
    lambda: |-
      if (!id(reg_fault).has_state()) return {};
      uint16_t f = (uint16_t)id(reg_fault).state;
      // 255=normal, 511=no-flow protection (not an error per se)
      // Any other value = real E-code fault
      return f != 255 && f != 511;

  - platform: template
    name: "Pool Heater Water Flow"
    id: water_flow
    device_class: running
    icon: mdi:water
    lambda: |-
      if (!id(reg_water_flow).has_state()) return {};
      return id(reg_water_flow).state == 1;  // 1=flow present, 0=no flow

  - platform: template
    name: "Pool Heater Heating Active"
    id: heating_active
    device_class: heat
    icon: mdi:fire
    lambda: |-
      if (!id(active_heating).has_state()) return {};
      return id(active_heating).state > 0;

# ====================================================================
# Scripts
# ====================================================================
script:
  - id: send_full_block
    mode: queued
    then:
      - lambda: |-
          std::vector<uint16_t> payload = {
            (uint16_t)id(cache_cool_setpoint),
            (uint16_t)id(cache_heat_setpoint),
            (uint16_t)id(cache_upper_bound),
            (uint16_t)id(cache_lower_bound),
            (uint16_t)id(cache_mode),
            (uint16_t)id(cache_power),
            0,
            (uint16_t)id(cache_energy),
            (uint16_t)id(cache_version)
          };
          auto cmd = esphome::modbus_controller::ModbusCommandItem::create_write_multiple_command(
            id(heatpump), 0x0300, 9, payload);
          id(heatpump)->queue_command(cmd);
          ESP_LOGI("pool", "Sent block: C=%d H=%d M=%d P=%d E=%d",
            id(cache_cool_setpoint), id(cache_heat_setpoint),
            id(cache_mode), id(cache_power), id(cache_energy));

  - id: send_mode_write
    mode: queued
    then:
      - lambda: |-
          auto cmd = esphome::modbus_controller::ModbusCommandItem::create_write_single_command(
            id(heatpump), 0x0304, (uint16_t)id(cache_mode));
          id(heatpump)->queue_command(cmd);
          ESP_LOGI("pool", "Sent mode write: 0x%02X", id(cache_mode));

  - id: send_auto_setpoint_write
    mode: queued
    then:
      - lambda: |-
          auto cmd = esphome::modbus_controller::ModbusCommandItem::create_write_single_command(
            id(heatpump), 0x030B, (uint16_t)id(cache_auto_setpoint));
          id(heatpump)->queue_command(cmd);
          ESP_LOGI("pool", "Sent auto setpoint: %d", id(cache_auto_setpoint));

  - id: check_confirmations
    mode: single
    then:
      - lambda: |-
          uint32_t now = millis();
          std::string err = "";
          // Before the first successful control-block read the caches hold
          // boot defaults - publishing them would show fabricated state.
          // Pending retry logic still runs; publishing does not.
          bool synced = (id(last_ctrl_read_ts) != 0);

          // ----- Power -----
          if (id(pending_power_value) >= 0) {
            uint32_t age = now - id(pending_power_ts);
            if (id(cache_power) == id(pending_power_value) && id(last_ctrl_read_ts) >= id(pending_power_ts)) {
              id(power_switch).publish_state(id(cache_power) == 1);
              id(pending_power_value) = -1;
              id(pending_power_retried) = false;
            } else if (age > 10000 && id(offline_since) == 0) {
              char buf[100];
              snprintf(buf, sizeof(buf), "Power write rejected: requested %d, reads %d",
                id(pending_power_value), id(cache_power));
              err = buf;
              id(pending_power_value) = -1;
              id(pending_power_retried) = false;
            } else if (age > 5000 && !id(pending_power_retried)) {
              id(pending_power_retried) = true;
              id(send_full_block).execute();
              ESP_LOGW("pool", "Retrying power write");
            }
          } else if (synced) {
            id(power_switch).publish_state(id(cache_power) == 1);
          }

          // ----- Mode -----
          if (id(pending_mode_value) >= 0) {
            uint32_t age = now - id(pending_mode_ts);
            if (id(cache_mode) == id(pending_mode_value) && id(last_ctrl_read_ts) >= id(pending_mode_ts)) {
              const char* mode_str = (id(cache_mode)==0) ? "Cool" :
                                     (id(cache_mode)==1) ? "Heat" : "Auto";
              id(mode_select).publish_state(mode_str);
              id(pending_mode_value) = -1;
              id(pending_mode_retried) = false;
            } else if (age > 10000 && id(offline_since) == 0) {
              char buf[100];
              snprintf(buf, sizeof(buf), "Mode write rejected: requested 0x%02X, reads 0x%02X",
                id(pending_mode_value), id(cache_mode));
              err = buf;
              id(pending_mode_value) = -1;
              id(pending_mode_retried) = false;
            } else if (age > 5000 && !id(pending_mode_retried)) {
              id(pending_mode_retried) = true;
              id(send_mode_write).execute();
              ESP_LOGW("pool", "Retrying mode write");
            }
          } else if (synced) {
            const char* mode_str = (id(cache_mode)==0) ? "Cool" :
                                   (id(cache_mode)==1) ? "Heat" : "Auto";
            id(mode_select).publish_state(mode_str);
          }

          // ----- Cool setpoint -----
          if (id(pending_cool_setpoint) >= 0) {
            uint32_t age = now - id(pending_cool_setpoint_ts);
            if (id(cache_cool_setpoint) == id(pending_cool_setpoint) && id(last_ctrl_read_ts) >= id(pending_cool_setpoint_ts)) {
              id(cool_setpoint_number).publish_state(id(cache_cool_setpoint));
              id(pending_cool_setpoint) = -1;
              id(pending_cool_setpoint_retried) = false;
            } else if (age > 10000 && id(offline_since) == 0) {
              char buf[120];
              snprintf(buf, sizeof(buf), "Cool setpoint rejected: requested %d°F, reads %d°F (unit off?)",
                id(pending_cool_setpoint), id(cache_cool_setpoint));
              err = buf;
              id(pending_cool_setpoint) = -1;
              id(pending_cool_setpoint_retried) = false;
            } else if (age > 5000 && !id(pending_cool_setpoint_retried)) {
              id(pending_cool_setpoint_retried) = true;
              id(send_full_block).execute();
              ESP_LOGW("pool", "Retrying cool setpoint write");
            }
          } else if (synced) {
            id(cool_setpoint_number).publish_state(id(cache_cool_setpoint));
          }

          // ----- Heat setpoint -----
          if (id(pending_heat_setpoint) >= 0) {
            uint32_t age = now - id(pending_heat_setpoint_ts);
            if (id(cache_heat_setpoint) == id(pending_heat_setpoint) && id(last_ctrl_read_ts) >= id(pending_heat_setpoint_ts)) {
              id(heat_setpoint_number).publish_state(id(cache_heat_setpoint));
              id(pending_heat_setpoint) = -1;
              id(pending_heat_setpoint_retried) = false;
            } else if (age > 10000 && id(offline_since) == 0) {
              char buf[120];
              snprintf(buf, sizeof(buf), "Heat setpoint rejected: requested %d°F, reads %d°F (unit off?)",
                id(pending_heat_setpoint), id(cache_heat_setpoint));
              err = buf;
              id(pending_heat_setpoint) = -1;
              id(pending_heat_setpoint_retried) = false;
            } else if (age > 5000 && !id(pending_heat_setpoint_retried)) {
              id(pending_heat_setpoint_retried) = true;
              id(send_full_block).execute();
              ESP_LOGW("pool", "Retrying heat setpoint write");
            }
          } else if (synced) {
            id(heat_setpoint_number).publish_state(id(cache_heat_setpoint));
          }

          // ----- Auto setpoint -----
          if (id(pending_auto_setpoint) >= 0) {
            uint32_t age = now - id(pending_auto_setpoint_ts);
            if (id(cache_auto_setpoint) == id(pending_auto_setpoint) && id(last_ctrl_read_ts) >= id(pending_auto_setpoint_ts)) {
              id(auto_setpoint_number).publish_state(id(cache_auto_setpoint));
              id(pending_auto_setpoint) = -1;
              id(pending_auto_setpoint_retried) = false;
            } else if (age > 10000 && id(offline_since) == 0) {
              char buf[120];
              snprintf(buf, sizeof(buf), "Auto setpoint rejected: requested %d°F, reads %d°F",
                id(pending_auto_setpoint), id(cache_auto_setpoint));
              err = buf;
              id(pending_auto_setpoint) = -1;
              id(pending_auto_setpoint_retried) = false;
            } else if (age > 5000 && !id(pending_auto_setpoint_retried)) {
              id(pending_auto_setpoint_retried) = true;
              id(send_auto_setpoint_write).execute();
              ESP_LOGW("pool", "Retrying auto setpoint write");
            }
          } else if (synced) {
            id(auto_setpoint_number).publish_state(id(cache_auto_setpoint));
          }

          // ----- Energy mode -----
          if (id(pending_energy) >= 0) {
            uint32_t age = now - id(pending_energy_ts);
            if (id(cache_energy) == id(pending_energy) && id(last_ctrl_read_ts) >= id(pending_energy_ts)) {
              const char* e_str = (id(cache_energy)==0) ? "Standard" :
                                  (id(cache_energy)==1) ? "Boost" : "Eco";
              id(energy_select).publish_state(e_str);
              id(pending_energy) = -1;
              id(pending_energy_retried) = false;
            } else if (age > 10000 && id(offline_since) == 0) {
              char buf[100];
              snprintf(buf, sizeof(buf), "Energy mode rejected: requested %d, reads %d",
                id(pending_energy), id(cache_energy));
              err = buf;
              id(pending_energy) = -1;
              id(pending_energy_retried) = false;
            } else if (age > 5000 && !id(pending_energy_retried)) {
              id(pending_energy_retried) = true;
              id(send_full_block).execute();
              ESP_LOGW("pool", "Retrying energy mode write");
            }
          } else if (synced) {
            const char* e_str = (id(cache_energy)==0) ? "Standard" :
                                (id(cache_energy)==1) ? "Boost" : "Eco";
            id(energy_select).publish_state(e_str);
          }

          if (!err.empty()) {
            id(last_error).publish_state(err);
            ESP_LOGE("pool", "%s", err.c_str());
          }

# ====================================================================
# Watchdog: hard reboot only if bus continuously dead >5 minutes
# (on_online zeroes the timer, so offline/online flapping never trips it)
# ====================================================================
interval:
  - interval: 60s
    then:
      - lambda: |-
          if (id(offline_since) != 0 && (millis() - id(offline_since)) > 300000) {
            ESP_LOGE("pool", "Modbus offline >5 min - rebooting to clear bus state");
            App.safe_reboot();
          }

  # Confirmation watchdog on a timer. Previously check_confirmations only
  # ran from the 0x030B read callback - on a dead bus no reads succeed, so
  # writes got no retry and no error report at all. The timer guarantees
  # the retry (5s) and error (10s) windows fire regardless of bus health.
  - interval: 5s
    then:
      - script.execute: check_confirmations

button:
  - platform: restart
    name: "${friendly_name} Restart"

# ====================================================================
# Sensors
# ====================================================================
sensor:
  # ----- Control block (0x0300-0x030B) — internal cache -----
  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_cool_setpoint
    register_type: holding
    address: 0x0300
    value_type: U_WORD
    internal: true
    on_value:
      then:
        - lambda: 'id(cache_cool_setpoint) = (int)x;'

  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_heat_setpoint
    register_type: holding
    address: 0x0301
    value_type: U_WORD
    internal: true
    on_value:
      then:
        - lambda: 'id(cache_heat_setpoint) = (int)x;'

  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_upper
    register_type: holding
    address: 0x0302
    value_type: U_WORD
    internal: true
    on_value:
      then:
        - lambda: 'id(cache_upper_bound) = (int)x;'

  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_lower
    register_type: holding
    address: 0x0303
    value_type: U_WORD
    internal: true
    on_value:
      then:
        - lambda: 'id(cache_lower_bound) = (int)x;'

  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_mode
    register_type: holding
    address: 0x0304
    value_type: U_WORD
    internal: true
    on_value:
      then:
        - lambda: 'id(cache_mode) = (int)x;'

  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_power
    register_type: holding
    address: 0x0305
    value_type: U_WORD
    internal: true
    on_value:
      then:
        - lambda: 'id(cache_power) = (int)x;'

  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_energy
    register_type: holding
    address: 0x0307
    value_type: U_WORD
    internal: true
    on_value:
      then:
        - lambda: 'id(cache_energy) = (int)x;'

  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_version
    register_type: holding
    address: 0x0308
    value_type: U_WORD
    internal: true
    on_value:
      then:
        - lambda: 'id(cache_version) = (int)x;'

  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_auto_setpoint
    register_type: holding
    address: 0x030B
    value_type: U_WORD
    internal: true
    on_value:
      then:
        - lambda: |-
            id(cache_auto_setpoint) = (int)x;
            id(last_ctrl_read_ts) = millis();
        - script.execute: check_confirmations

  # Padding regs 0x0306, 0x0309, 0x030A: merges the control block into
  # a single 768-779 frame (was three frames, saves 200ms throttle/cycle)
  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_pad_774
    register_type: holding
    address: 0x0306
    value_type: U_WORD
    internal: true

  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_pad_777
    register_type: holding
    address: 0x0309
    value_type: U_WORD
    internal: true

  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_pad_778
    register_type: holding
    address: 0x030A
    value_type: U_WORD
    internal: true

  # ----- Operational sensors -----
  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Compressor Frequency"
    address: 64
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "Hz"
    icon: mdi:sine-wave

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Fan Frequency"
    address: 65
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "Hz"
    icon: mdi:fan

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater EEV Opening"
    address: 66
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "steps"
    icon: mdi:valve

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Energy Total"
    address: 72
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Ambient Temp"
    address: 74
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "°F"

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Coiler Temp"
    address: 75
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "°F"

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Incoiler Temp"
    address: 76
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "°F"

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Suction Temp"
    address: 77
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "°F"

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Discharge Temp"
    address: 78
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "°F"

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Outlet Water Temp"
    address: 80
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "°F"

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Inlet Water Temp"
    address: 84
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "°F"

  # ------------------------------------------------------------------
  # Gap fillers for the 64-84 block. With these present the block is
  # contiguous and ESPHome reads all 21 registers in ONE Modbus frame
  # instead of four - each frame costs a 100ms throttle slot, so this
  # REDUCES bus load while adding sensors.
  # ------------------------------------------------------------------

  # Reg 68: AC input voltage. Stable 239-244V, sags ~3V when compressor
  # stops (line drop under load) - consistent with 240V residential supply.
  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater AC Voltage"
    address: 68
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "V"
    icon: mdi:sine-wave
    # Early warning for brownouts / P8-P10 / P26 voltage faults

  # Reg 69: compressor load metric, scales ~1.5-1.7x compressor Hz.
  # Hypothesis: input current in 0.1A units (unconfirmed - raw value kept)
  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Compressor Load"
    address: 69
    register_type: holding
    value_type: U_WORD
    icon: mdi:gauge

  # Reg 71: varies with compressor load. Hypothesis: refrigerant temp
  # at an intermediate circuit point (unconfirmed - raw value kept)
  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Refrigerant Metric"
    address: 71
    register_type: holding
    value_type: U_WORD
    icon: mdi:thermometer-lines

  # Reg 81: water tank sensor. Reads -58 = not installed on this model
  # (source of the cosmetic E14 in Tuya). Internal - exposed only on web UI.
  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_tank_sensor
    address: 81
    register_type: holding
    value_type: S_WORD
    internal: true

  # Regs 67, 73, 82, 83: padding to keep the frame contiguous.
  # 67/73/82 confirmed always 0; 83 always 1 when powered (purpose TBD).
  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_pad_67
    address: 67
    register_type: holding
    value_type: U_WORD
    internal: true

  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_pad_73
    address: 73
    register_type: holding
    value_type: U_WORD
    internal: true

  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_pad_82
    address: 82
    register_type: holding
    value_type: U_WORD
    internal: true

  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_state_83
    address: 83
    register_type: holding
    value_type: U_WORD
    internal: true

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Flow Status"
    id: reg_fault
    address: 29
    register_type: holding
    value_type: U_WORD
    icon: mdi:water-check
    # 255 = water flow present
    # 511 = no flow (protection mode, not a fault per se)
    # Other = potential E-code fault (TBD)

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Active Heating"
    id: active_heating
    address: 70
    register_type: holding
    value_type: U_WORD
    icon: mdi:waves-arrow-right
    # Scales with compressor load (~= compressor Hz)
    # Non-zero = unit is actively transferring heat

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Water Temp (display)"
    address: 79
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "°F"
    icon: mdi:thermometer-water
    # Mirrors inlet water temp — smoothed value used by display

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Running State"
    address: 785
    register_type: holding
    value_type: U_WORD
    force_new_range: true
    icon: mdi:state-machine
    # 0x1C (28) = post-shutdown equalization

  # ------------------------------------------------------------------
  # Protection status block (96-99). Pattern: 1 = OK, 0 = fault active.
  # Reg 98 = water flow (E03), CONFIRMED. 96/97/99 = TBD; candidates are
  # high pressure (E05), low pressure (E06), phase (E01/E02).
  # Reading all four = same single frame as reading 98 alone.
  # These are the fault-hunting registers: real-time, no skip.
  # ------------------------------------------------------------------
  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Protection Bit 96"
    address: 96
    register_type: holding
    value_type: U_WORD
    icon: mdi:shield-check

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Protection Bit 97"
    address: 97
    register_type: holding
    value_type: U_WORD
    icon: mdi:shield-check

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Water Flow Sensor"
    id: reg_water_flow
    address: 98
    register_type: holding
    value_type: U_WORD
    icon: mdi:waves

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Protection Bit 99"
    address: 99
    register_type: holding
    value_type: U_WORD
    icon: mdi:shield-check

  # ------------------------------------------------------------------
  # Slow diagnostics (every 12th cycle = 60s at 5s base).
  # Regs 272-275: 272 = running-hours candidate (998, watch long-term);
  # 274/275 = 86/90, refrigerant pressure candidates (PSI?) - these are
  # the registers to check during a future E05/E06 pressure fault.
  # skip_updates on EVERY sensor in the range (range takes the minimum).
  # ------------------------------------------------------------------
  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Runtime Counter"
    address: 272
    register_type: holding
    value_type: U_WORD
    force_new_range: true
    skip_updates: 12
    icon: mdi:counter

  - platform: modbus_controller
    modbus_controller_id: heatpump
    id: reg_273
    address: 273
    register_type: holding
    value_type: U_WORD
    skip_updates: 12
    internal: true

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Pressure A"
    address: 274
    register_type: holding
    value_type: U_WORD
    skip_updates: 12
    icon: mdi:gauge-low
    # Hypothesis: low-side refrigerant pressure (PSI)

  - platform: modbus_controller
    modbus_controller_id: heatpump
    name: "Pool Heater Pressure B"
    address: 275
    register_type: holding
    value_type: U_WORD
    skip_updates: 12
    icon: mdi:gauge
    # Hypothesis: high-side refrigerant pressure (PSI)

# ====================================================================
switch:
  - platform: template
    name: "Pool Heater Power"
    id: power_switch
    icon: mdi:power
    optimistic: false
    restore_mode: DISABLED
    turn_on_action:
      - lambda: |-
          id(cache_power) = 1;
          id(pending_power_value) = 1;
          id(pending_power_ts) = millis();
          id(pending_power_retried) = false;
      - script.execute: send_full_block
    turn_off_action:
      - lambda: |-
          id(cache_power) = 0;
          id(pending_power_value) = 0;
          id(pending_power_ts) = millis();
          id(pending_power_retried) = false;
      - script.execute: send_full_block

select:
  - platform: template
    name: "Pool Heater Mode"
    id: mode_select
    icon: mdi:thermostat
    optimistic: false
    options:
      - "Cool"
      - "Heat"
      - "Auto"
    set_action:
      - lambda: |-
          int v = 1;
          if (x == "Cool") v = 0;
          else if (x == "Heat") v = 1;
          else if (x == "Auto") v = 8;
          id(cache_mode) = v;
          id(pending_mode_value) = v;
          id(pending_mode_ts) = millis();
          id(pending_mode_retried) = false;
      - script.execute: send_mode_write

  - platform: template
    name: "Pool Heater Energy Mode"
    id: energy_select
    icon: mdi:leaf
    optimistic: false
    options:
      - "Standard"
      - "Boost"
      - "Eco"
    set_action:
      - lambda: |-
          int v = 0;
          if (x == "Standard") v = 0;
          else if (x == "Boost") v = 1;
          else if (x == "Eco") v = 2;
          id(cache_energy) = v;
          id(pending_energy) = v;
          id(pending_energy_ts) = millis();
          id(pending_energy_retried) = false;
      - script.execute: send_full_block

number:
  - platform: template
    name: "Pool Heater Cool Setpoint"
    id: cool_setpoint_number
    icon: mdi:snowflake-thermometer
    unit_of_measurement: "°F"
    min_value: 47
    max_value: 83
    step: 1
    mode: box
    optimistic: false
    set_action:
      - lambda: |-
          int v = (int)x;
          id(cache_cool_setpoint) = v;
          id(pending_cool_setpoint) = v;
          id(pending_cool_setpoint_ts) = millis();
          id(pending_cool_setpoint_retried) = false;
      - script.execute: send_full_block

  - platform: template
    name: "Pool Heater Heat Setpoint"
    id: heat_setpoint_number
    icon: mdi:fire-circle
    unit_of_measurement: "°F"
    min_value: 47
    max_value: 104
    step: 1
    mode: box
    optimistic: false
    set_action:
      - lambda: |-
          int v = (int)x;
          id(cache_heat_setpoint) = v;
          id(pending_heat_setpoint) = v;
          id(pending_heat_setpoint_ts) = millis();
          id(pending_heat_setpoint_retried) = false;
      - script.execute: send_full_block

  - platform: template
    name: "Pool Heater Auto Setpoint"
    id: auto_setpoint_number
    icon: mdi:thermometer-auto
    unit_of_measurement: "°F"
    min_value: 47
    max_value: 104
    step: 1
    mode: box
    optimistic: false
    set_action:
      - lambda: |-
          int v = (int)x;
          id(cache_auto_setpoint) = v;
          id(pending_auto_setpoint) = v;
          id(pending_auto_setpoint_ts) = millis();
          id(pending_auto_setpoint_retried) = false;
      - script.execute: send_auto_setpoint_write